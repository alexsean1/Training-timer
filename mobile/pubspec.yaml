name: training_timer
description: "Fitness app for custom workout timers with intervals, rest periods, and exercise sequences."
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: 5.2.1
  flutter_secure_storage: 9.2.4
  dio: 5.9.1
  go_router: 14.8.1
  flutter_riverpod: 2.6.1
  freezed_annotation: 3.1.0
  json_annotation: 4.9.0
  audioplayers: 6.5.1
  flutter_tts: 4.2.5
  flutter_foreground_task: 8.17.0
  hive_flutter: 1.1.0
  uuid: 4.5.3
  geolocator: 13.0.4
  flutter_blue_plus: 1.36.8
  wakelock_plus: 1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  fake_async: ^1.3.0
  build_runner: ^2.4.0
  freezed: ^3.1.0
  json_serializable: ^6.6.2
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  assets:
    - .env
    - assets/icon/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0D0D0F"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: false

flutter_native_splash:
  color: "#0D0D0F"
  image: assets/icon/icon.png
  image_dark: assets/icon/icon.png
  color_dark: "#0D0D0F"
  android: true
  ios: true
  fullscreen: false
  android_gravity: center
  ios_content_mode: center
