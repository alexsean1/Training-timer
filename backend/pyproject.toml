# ─── Ruff ─────────────────────────────────────────────────────────────────────

[tool.ruff]
target-version = "py39"
line-length = 88
# migrations/ is auto-generated by Alembic; venv/ is not project code
exclude = ["migrations", "venv", ".venv"]

[tool.ruff.lint]
# E/W = pycodestyle, F = pyflakes, I = isort
select = ["E", "F", "W", "I"]
# E501: line-too-long — enforced by the formatter, not the linter
ignore = ["E501"]
# Don't flag unused imports in __init__.py re-exports
per-file-ignores = { "__init__.py" = ["F401"] }

# ─── Mypy ─────────────────────────────────────────────────────────────────────

[tool.mypy]
python_version = "3.9"
# Check only application code; migrations and tests have looser types
files = ["app"]
# Don't fail on third-party packages that ship without stubs
ignore_missing_imports = true
# Start permissive — tighten over time
disallow_untyped_defs = false
warn_return_any = false
no_strict_optional = true

# ─── Pytest ───────────────────────────────────────────────────────────────────

[tool.pytest.ini_options]
# Run tests from the backend/ directory: pytest
testpaths = ["tests"]

# Add backend/ to sys.path so `from app.xxx import yyy` works without install
pythonpath = ["."]

# Shorter tracebacks for cleaner output; use "long" when debugging failures
addopts = "--tb=short -q"

# pytest-asyncio: only treat tests decorated with @pytest.mark.asyncio as async
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"
