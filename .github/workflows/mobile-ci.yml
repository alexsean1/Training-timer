# Mobile CI — analyze and test the Flutter application.
#
# Branch protection recommendation:
#   In GitHub → Settings → Branches → Branch protection rules for `main`:
#   ✓ Require status checks to pass before merging
#     Required checks: "analyze-and-test" (this workflow)
#   ✓ Require branches to be up to date before merging
#
# Two jobs:
#   analyze-and-test — runs on every push/PR (fast, ~2–3 min)
#   build-apk        — runs only on push to main (slower, verifies release build)

name: Mobile CI

on:
  push:
    branches: [main, develop]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"

# ── Shared Flutter version ────────────────────────────────────────────────────
env:
  FLUTTER_VERSION: "3.24.0"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Static analysis + unit/widget tests
  # Runs on every push and pull request — must pass before merge.
  # ────────────────────────────────────────────────────────────────────────────
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Flutter setup ───────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          # Caches the Flutter SDK between runs (~400 MB saved)
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      # ── Pub cache ───────────────────────────────────────────────────────────
      # Separate from the Flutter SDK cache; keyed on pubspec.lock so it
      # rebuilds only when dependencies actually change.
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            mobile/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      # ── Static analysis ─────────────────────────────────────────────────────
      - name: Analyze (flutter analyze)
        run: flutter analyze --no-pub

      # ── Tests ───────────────────────────────────────────────────────────────
      # flutter_secure_storage uses platform channels that are automatically
      # stubbed to return null in the test environment — no mocking needed.
      - name: Run tests with coverage
        run: flutter test --coverage --no-pub

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: mobile/coverage/lcov.info
          flags: mobile
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: APK build verification
  # Runs only on push to main (after analyze-and-test passes).
  # Catches build-breaking changes that tests alone wouldn't catch
  # (e.g. missing assets, gradle config issues, plugin incompatibilities).
  # ────────────────────────────────────────────────────────────────────────────
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    # Only run on direct pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Android builds require Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            mobile/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      # The .env file is an asset but is gitignored.
      # Provide a minimal CI version with a placeholder URL.
      - name: Create .env for build
        run: echo "API_BASE_URL=https://api.example.com" > .env

      # Accept Android SDK licenses non-interactively
      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      # Upload the APK as a build artifact so it can be downloaded from
      # the Actions run page for manual smoke testing.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
